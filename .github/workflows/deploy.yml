name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate company entry files
        run: |
          mkdir -p dist/harbor dist/party dist/xmrt

          # Harbor
          sed \
            -e 's|<title>SuiteAI</title>|<title>SuiteAI \&mdash; 31 Harbor</title>|' \
            -e 's|<meta name="viewport" content="width=device-width, initial-scale=1.0" />|<meta name="viewport" content="width=device-width, initial-scale=1.0" />\n    <meta name="theme-color" content="#0A84FF" />|' \
            -e 's|<head>|<head>\n    <script>window.SUITEAI_COMPANY = "harbor"; window.SUITEAI_COMPANY_NAME = "31 Harbor"; window.SUITEAI_COMPANY_COLOR = "#0A84FF";</script>|' \
            dist/index.html > dist/harbor/index.html

          # Party
          sed \
            -e 's|<title>SuiteAI</title>|<title>SuiteAI \&mdash; Party Favor Photo</title>|' \
            -e 's|<meta name="viewport" content="width=device-width, initial-scale=1.0" />|<meta name="viewport" content="width=device-width, initial-scale=1.0" />\n    <meta name="theme-color" content="#F5A623" />|' \
            -e 's|<head>|<head>\n    <script>window.SUITEAI_COMPANY = "party"; window.SUITEAI_COMPANY_NAME = "Party Favor Photo"; window.SUITEAI_COMPANY_COLOR = "#F5A623";</script>|' \
            dist/index.html > dist/party/index.html

          # XMRT
          sed \
            -e 's|<title>SuiteAI</title>|<title>SuiteAI \&mdash; XMRT DAO</title>|' \
            -e 's|<meta name="viewport" content="width=device-width, initial-scale=1.0" />|<meta name="viewport" content="width=device-width, initial-scale=1.0" />\n    <meta name="theme-color" content="#7B61FF" />|' \
            -e 's|<head>|<head>\n    <script>window.SUITEAI_COMPANY = "xmrt"; window.SUITEAI_COMPANY_NAME = "XMRT DAO"; window.SUITEAI_COMPANY_COLOR = "#7B61FF";</script>|' \
            dist/index.html > dist/xmrt/index.html

          echo "Generated company entry files:"
          ls -la dist/harbor/index.html dist/party/index.html dist/xmrt/index.html

      - name: Copy support files
        run: |
          cp 404.html dist/404.html 2>/dev/null || true
          cp .nojekyll dist/.nojekyll 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
