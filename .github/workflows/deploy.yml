name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate company entry files
        run: |
          # Company configurations
          declare -A COMPANIES=(
            ["harbor"]='{"id":"harbor","name":"31 Harbor","color":"#0A84FF"}'
            ["party"]='{"id":"party","name":"Party Favor Photo","color":"#F5A623"}'
            ["xmrt"]='{"id":"xmrt","name":"XMRT DAO","color":"#7B61FF"}'
          )

          for key in "${!COMPANIES[@]}"; do
            config="${COMPANIES[$key]}"
            company_id=$(echo "$config" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            company_name=$(echo "$config" | python3 -c "import sys,json; print(json.load(sys.stdin)['name'])")
            company_color=$(echo "$config" | python3 -c "import sys,json; print(json.load(sys.stdin)['color'])")

            mkdir -p "dist/$company_id"

            # Read the built index.html and inject company config
            python3 << PYEOF
          import re

          with open('dist/index.html', 'r') as f:
              html = f.read()

          # Inject company config after <head>
          company_script = f'''<script>
            window.SUITEAI_COMPANY = "{company_id}";
            window.SUITEAI_COMPANY_NAME = "{company_name}";
            window.SUITEAI_COMPANY_COLOR = "{company_color}";
          </script>'''

          # Insert after <head> tag
          html = html.replace('<head>', f'<head>\n    {company_script}')

          # Update title
          html = html.replace('<title>SuiteAI</title>', f'<title>SuiteAI — {company_name}</title>')

          # Add theme-color meta
          html = html.replace('<meta name="viewport" content="width=device-width, initial-scale=1.0" />',
              f'<meta name="viewport" content="width=device-width, initial-scale=1.0" />\n    <meta name="theme-color" content="{company_color}" />')

          with open(f'dist/{company_id}/index.html', 'w') as f:
              f.write(html)

          print(f"Generated dist/{company_id}/index.html for {company_name}")
          PYEOF
          done

      - name: Copy support files
        run: |
          cp 404.html dist/404.html 2>/dev/null || true
          cp .nojekyll dist/.nojekyll 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
