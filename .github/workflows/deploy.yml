name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy sql.js WASM to dist
        run: cp node_modules/sql.js/dist/sql-wasm-browser.wasm dist/sql-wasm-browser.wasm

      - name: Generate company entry files
        run: |
          mkdir -p dist/harbor dist/party dist/xmrt
          for dir in harbor party xmrt; do
            cp dist/index.html "dist/$dir/index.html"
          done

          # Harbor
          sed -i "s|<title>SuiteAI</title>|<title>SuiteAI \&mdash; 31 Harbor</title>|" dist/harbor/index.html
          sed -i "s|<meta name=\"viewport"|<meta name=\"theme-color\" content=\"#0A84FF\" />\n    <meta name=\"viewport"|" dist/harbor/index.html
          sed -i "s|<head>|<head>\n    <script>window.SUITEAI_COMPANY=\"harbor\";window.SUITEAI_COMPANY_NAME=\"31 Harbor\";window.SUITEAI_COMPANY_COLOR=\"#0A84FF\";</script>|" dist/harbor/index.html

          # Party
          sed -i "s|<title>SuiteAI</title>|<title>SuiteAI \&mdash; Party Favor Photo</title>|" dist/party/index.html
          sed -i "s|<meta name=\"viewport"|<meta name=\"theme-color\" content=\"#F5A623\" />\n    <meta name=\"viewport"|" dist/party/index.html
          sed -i "s|<head>|<head>\n    <script>window.SUITEAI_COMPANY=\"party\";window.SUITEAI_COMPANY_NAME=\"Party Favor Photo\";window.SUITEAI_COMPANY_COLOR=\"#F5A623\";</script>|" dist/party/index.html

          # XMRT
          sed -i "s|<title>SuiteAI</title>|<title>SuiteAI \&mdash; XMRT DAO</title>|" dist/xmrt/index.html
          sed -i "s|<meta name=\"viewport"|<meta name=\"theme-color\" content=\"#7B61FF\" />\n    <meta name=\"viewport"|" dist/xmrt/index.html
          sed -i "s|<head>|<head>\n    <script>window.SUITEAI_COMPANY=\"xmrt\";window.SUITEAI_COMPANY_NAME=\"XMRT DAO\";window.SUITEAI_COMPANY_COLOR=\"#7B61FF\";</script>|" dist/xmrt/index.html

          echo "Generated company entries:"
          ls -la dist/harbor/index.html dist/party/index.html dist/xmrt/index.html

      - name: Copy support files
        run: |
          cp 404.html dist/404.html 2>/dev/null || true
          cp .nojekyll dist/.nojekyll 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
