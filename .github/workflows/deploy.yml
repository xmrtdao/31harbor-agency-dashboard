name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate company entry files
        run: |
          mkdir -p dist/harbor dist/party dist/xmrt

          python3 << 'PYEOF'
          import os

          companies = [
              ("harbor", "31 Harbor", "#0A84FF"),
              ("party", "Party Favor Photo", "#F5A623"),
              ("xmrt", "XMRT DAO", "#7B61FF"),
          ]

          with open('dist/index.html', 'r') as f:
              base_html = f.read()

          for company_id, company_name, company_color in companies:
              html = base_html

              company_script = f'''<script>
      window.SUITEAI_COMPANY = "{company_id}";
      window.SUITEAI_COMPANY_NAME = "{company_name}";
      window.SUITEAI_COMPANY_COLOR = "{company_color}";
    </script>'''

              html = html.replace('<head>', f'<head>\n    {company_script}')
              html = html.replace('<title>SuiteAI</title>', f'<title>SuiteAI — {company_name}</title>')
              html = html.replace(
                  '<meta name="viewport" content="width=device-width, initial-scale=1.0" />',
                  f'<meta name="viewport" content="width=device-width, initial-scale=1.0" />\n    <meta name="theme-color" content="{company_color}" />'
              )

              with open(f'dist/{company_id}/index.html', 'w') as f:
                  f.write(html)

              print(f"Generated dist/{company_id}/index.html for {company_name}")
          PYEOF

      - name: Copy support files
        run: |
          cp 404.html dist/404.html 2>/dev/null || true
          cp .nojekyll dist/.nojekyll 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
