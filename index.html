<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SuiteAI</title>
    <script>
      // Route to company-specific dashboard based on subdomain
      var host = window.location.hostname;
      var company = null;
      if (host.indexOf('31harbor') !== -1) company = 'harbor';
      else if (host.indexOf('partyfavorphoto') !== -1) company = 'party';
      else if (host.indexOf('mobilemonero') !== -1 || host.indexOf('xmrt') !== -1) company = 'xmrt';

      if (company) {
        window.location.replace('/' + company + '/');
      } else {
        // Default: show company selector
        window.location.replace('/harbor/');
      }
    </script>
    <style>body{background:#08090E;color:#8B95A5;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}</style>
  </head>
  <body>Loading SuiteAI...</body>
</html>
