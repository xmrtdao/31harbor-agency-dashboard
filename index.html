<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic OS - 31 Harbor Agency Dashboard</title>
    <style>
        /* ===== RESET & BASE STYLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border: #333;
            --accent-research: #0066cc;
            --accent-content: #f59e0b;
            --accent-community: #dc2626;
            --accent-agency: #8b5cf6;
            --success: #22c55e;
            --warning: #f59e0b;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Courier New', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-text-size-adjust: 100%;
        }
        
        .container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 15px;
        }
        
        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 15px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #fff;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        /* ===== COMPANY SECTION ===== */
        .company-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .company-section-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent-research);
        }
        
        .company-section-header h2 {
            font-size: 1.8rem;
            color: #fff;
            margin: 0;
            margin-left: 10px;
        }
        
        .company-section-header .icon {
            font-size: 2rem;
        }

        /* ===== CONDUCTOR SECTION ===== */
        .conductor {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--accent-research);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .conductor h3 {
            font-size: 1.3rem;
            color: var(--accent-research);
            margin-bottom: 10px;
        }
        
        .conductor p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        /* ===== DOMAINS GRID ===== */
        .domains-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .domain {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .domain-header {
            padding: 15px;
            border-bottom: 2px solid;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .domain-header.research { border-color: var(--accent-research); }
        .domain-header.content { border-color: var(--accent-content); }
        .domain-header.community { border-color: var(--accent-community); }
        .domain-header.agency { border-color: var(--accent-agency); }
        
        .domain-header h4 {
            font-size: 1.1rem;
            margin: 0;
        }
        
        .domain-icon {
            font-size: 1.3rem;
        }
        
        .domain-content {
            padding: 15px;
        }
        
        /* ===== SKILL CARDS ===== */
        .skills-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        
        .skill-card {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        
        .skill-card:hover {
            background: #2d2d2d;
            transform: translateX(5px);
        }
        
        .skill-card.research { border-color: var(--accent-research); }
        .skill-card.content { border-color: var(--accent-content); }
        .skill-card.community { border-color: var(--accent-community); }
        .skill-card.agency { border-color: var(--accent-agency); }
        
        .skill-info {
            flex: 1;
        }
        
        .skill-name {
            font-weight: 600;
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 3px;
        }
        
        .skill-status {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .skill-run-btn {
            background: var(--accent-research);
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            margin-left: 10px;
        }
        
        .skill-run-btn:hover {
            background: #0055aa;
            transform: scale(1.05);
        }
        
        .skill-card.content .skill-run-btn { background: var(--accent-content); }
        .skill-card.content .skill-run-btn:hover { background: #d97706; }
        .skill-card.community .skill-run-btn { background: var(--accent-community); }
        .skill-card.community .skill-run-btn:hover { background: #b91c1c; }
        .skill-card.agency .skill-run-btn { background: var(--accent-agency); }
        .skill-card.agency .skill-run-btn:hover { background: #7c3aed; }
        
        /* ===== AUTOMATION LAYER ===== */
        .automation-layer {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .automation-layer h4 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #fff;
        }
        
        .automation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }
        
        .automation-tool {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        
        .automation-tool:hover {
            border-color: var(--accent-research);
            background: #2d2d2d;
        }
        
        .automation-tool-icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        /* ===== MEMORY VAULT ===== */
        .memory-vault {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .memory-vault h4 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #fff;
        }
        
        .vault-sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .vault-section {
            background: var(--bg-tertiary);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        
        .vault-section h5 {
            color: var(--accent-research);
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .vault-stat {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }
        
        .vault-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }
        
        /* ===== OBSERVABILITY DASHBOARD ===== */
        .observability {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .observability h4 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #fff;
        }
        
        .obs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .obs-card {
            background: var(--bg-tertiary);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        
        .obs-card h5 {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .obs-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-research);
            margin-bottom: 5px;
        }
        
        .obs-unit {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }
        
        .skill-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }
        
        .skill-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .skill-btn:hover {
            border-color: var(--accent-research);
            background: #2d2d2d;
        }
        
        /* ===== ACTIVITY LOG ===== */
        .activity-log {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .activity-log h4 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #fff;
        }
        
        .log-entries {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #222;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-success { color: var(--success); }
        .log-pending { color: var(--warning); }
        .log-error { color: #ef4444; }
        
        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 20px 15px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            margin-top: 30px;
            font-size: 0.85rem;
        }
        
        footer a {
            color: var(--accent-research);
            text-decoration: none;
        }
        
        footer a:hover {
            text-decoration: underline;
        }
        
        /* ===== RESPONSIVE DESIGN ===== */
        @media (min-width: 768px) {
            .container {
                padding: 20px;
            }
            
            header {
                padding: 30px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .domains-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .obs-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 1024px) {
            .domains-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .obs-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .container {
                padding: 30px;
            }
        }
        
        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>

                <a href="https://31harbor.com">31 Harbor</a> •
                <a href="https://partyfavorphoto.com">Party Favor Photo</a>
            </p>
        </footer>
    </div>

    <script>

                                <div class="skill-buttons">
                                    <button class="skill-btn">🧹 Vault Cleanup</button>
                                    <button class="skill-btn">📰 Morning Brief</button>
                                    <button class="skill-btn">🔍 YT Search</button>
                                    <button class="skill-btn">✍️ Draft Content</button>
                                    <button class="skill-btn">📊 Generate Report</button>
                                    <button class="skill-btn">🔄 Sync Data</button>
                                </div>
                            </div>

                            <!-- Activity Log -->
                            <div class="activity-log">
                                <h4>📝 Activity Log for ${companyName}</h4>
                                <div class="log-entries" id="activity-entries-${companyName.replace(/\s/g, '-')}">
                                    <div class="log-entry"><span class="log-success">✓</span> Dashboard initialized - Agentic OS v2.1</div>
                                    ${companyData.recent_emails.map(email => {
                                        const status = email.last_event === 'delivered' ? 'success' : 'pending';
                                        const statusSymbol = status === 'success' ? '✓' : '⏳';
                                        const timestamp = new Date(email.created_at).toLocaleString();
                                        return `<div class="log-entry"><span class="log-${status}">${statusSymbol}</span> ${email.subject.substring(0, 40)}... (${timestamp})</div>`;
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    companyDashboardsContainer.innerHTML += companySectionHTML;
                }
                
            } catch (e) {
                console.error('Failed to load dashboard:', e);
            }
        }
        
        loadDashboard();
        // Auto-refresh every 2 minutes
        setInterval(loadDashboard, 120000);
    </script>
</body>
</html>
