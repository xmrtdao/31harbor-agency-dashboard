<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuiteAI</title>
    <script>
      (function() {
        var host = window.location.hostname;
        var company = null;
        var color = '#0A84FF';
        if (host.indexOf('31harbor') !== -1) { company = 'harbor'; color = '#0A84FF'; }
        else if (host.indexOf('partyfavorphoto') !== -1) { company = 'party'; color = '#F5A623'; }
        else if (host.indexOf('mobilemonero') !== -1 || host.indexOf('xmrtdao') !== -1) { company = 'xmrt'; color = '#7B61FF'; }

        if (company) {
          var path = '/' + company + '/';
          if (window.location.pathname !== path) {
            window.location.replace(path);
            return;
          }
          // Already on company path — inject company config before app loads
          window.SUITEAI_COMPANY = company;
          window.SUITEAI_COMPANY_NAME = company === 'harbor' ? '31 Harbor' : company === 'party' ? 'Party Favor Photo' : 'XMRT DAO';
          window.SUITEAI_COMPANY_COLOR = color;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
